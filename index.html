<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Flashcards — Yuran</title>
<style>
  :root {
    --sys-font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Apple SD Gothic Neo", sans-serif;
    --mono-font: "SF Mono", ui-monospace, Menlo, monospace;
    /* Claude Code palette — warm, editorial */
    --bg: #1a1613;
    --bg-soft: #252019;
    --bg-elev: #2d2720;
    --paper: #f5ede0;
    --paper-dim: #e8dcc7;
    --ink: #1f1a14;
    --ink-soft: #3a3128;
    --accent: #cc7b5c;      /* warm coral */
    --accent-bright: #e89274;
    --accent-soft: #f2a88c;
    --gold: #d4a574;         /* muted gold */
    --sage: #8ba888;         /* sage green */
    --sage-bright: #a8c5a0;
    --mist: #b8a898;         /* warm muted */
    --muted: #8c7f70;
    --success: #8ba888;
    --error: #c25e4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--paper);
    font-family: var(--sys-font);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(204,123,92,0.12), transparent 55%),
      radial-gradient(ellipse at 80% 90%, rgba(139,168,136,0.08), transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(212,165,116,0.05), transparent 60%);
    padding: 20px 16px 60px;
  }
  .wrap { max-width: 560px; margin: 0 auto; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(244,234,213,0.15);
  }
  .logo {
    font-family: var(--sys-font);
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.03em;
  }
  .logo span { color: var(--accent-bright); }
  .sub {
    font-family: var(--mono-font);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  /* Stats bar */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .stat {
    background: var(--bg-soft);
    border: 0.5px solid rgba(245,237,224,0.08);
    padding: 12px 8px;
    border-radius: 10px;
    text-align: center;
  }
  .stat-num {
    font-family: var(--sys-font);
    font-weight: 600;
    font-size: 24px;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .stat-num.ok { color: var(--success); }
  .stat-num.bad { color: var(--accent-soft); }
  .stat-num.gold { color: var(--gold); }
  .stat-label {
    font-family: var(--mono-font);
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
  }

  /* Category filter */
  .filters {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 16px;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    background: transparent;
    border: 0.5px solid rgba(245,237,224,0.2);
    color: var(--paper);
    padding: 8px 14px;
    border-radius: 999px;
    font-family: var(--sys-font);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: -0.01em;
  }
  .chip:hover {
    border-color: var(--gold);
    color: var(--gold);
  }
  .chip.active {
    background: var(--accent);
    color: var(--paper);
    border-color: var(--accent);
    font-weight: 500;
  }

  /* Progress */
  .progress {
    font-family: var(--mono-font);
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 10px;
    letter-spacing: 0.08em;
  }
  .progress-bar {
    height: 2px;
    background: rgba(245,237,224,0.08);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold), var(--sage));
    transition: width 0.4s ease;
  }

  /* Card */
  .card-stage {
    margin-bottom: 24px;
  }
  .card {
    position: relative;
    width: 100%;
    min-height: 400px;
    background: var(--paper);
    color: var(--ink);
    border-radius: 16px;
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.2);
    cursor: pointer;
    background-image:
      radial-gradient(circle at 15% 15%, rgba(212,165,116,0.18), transparent 55%),
      radial-gradient(circle at 85% 85%, rgba(204,123,92,0.1), transparent 55%),
      radial-gradient(circle at 50% 100%, rgba(139,168,136,0.08), transparent 50%);
    transition: background 0.25s ease;
  }
  .card.revealed {
    background: var(--bg-elev);
    color: var(--paper);
    background-image:
      radial-gradient(circle at 20% 20%, rgba(204,123,92,0.14), transparent 55%),
      radial-gradient(circle at 80% 80%, rgba(139,168,136,0.1), transparent 55%),
      linear-gradient(180deg, rgba(212,165,116,0.05), transparent 60%);
    border: 0.5px solid rgba(212,165,116,0.2);
  }
  .card-tag {
    font-family: var(--mono-font);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #9a8f7c;
  }
  .card.revealed .card-tag { color: var(--muted); }
  .card-main {
    flex-grow: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px 0;
  }
  .card-content {
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .prompt-text {
    font-family: var(--sys-font);
    font-size: 36px;
    font-weight: 600;
    line-height: 1.35;
    letter-spacing: -0.02em;
    color: inherit;
  }
  .answer-text {
    font-family: var(--sys-font);
    font-size: 32px;
    font-weight: 500;
    line-height: 1.3;
    letter-spacing: -0.02em;
    color: inherit;
  }
  .example {
    font-family: var(--sys-font);
    font-size: 15px;
    font-weight: 400;
    color: var(--gold);
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px dashed rgba(212,165,116,0.3);
    line-height: 1.5;
    letter-spacing: -0.01em;
  }
  .note {
    font-family: var(--sys-font);
    font-size: 12px;
    font-weight: 400;
    color: var(--mist);
    margin-top: 8px;
    line-height: 1.5;
    letter-spacing: -0.01em;
  }
  .hint-tap {
    text-align: center;
    font-family: var(--mono-font);
    font-size: 9px;
    color: #aaa095;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .card.revealed .hint-tap { color: var(--muted); }

  /* Accent line */
  .accent-line {
    position: absolute;
    top: 0;
    left: 28px;
    right: 28px;
    height: 2px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--gold) 50%, var(--sage) 100%);
    border-radius: 0 0 2px 2px;
    opacity: 0.85;
  }

  /* Action buttons */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .btn {
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-family: var(--sys-font);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: -0.01em;
  }
  .btn:active { transform: scale(0.97); }
  .btn-bad {
    background: rgba(194,94,74,0.12);
    color: #e8a090;
    border: 0.5px solid rgba(194,94,74,0.35);
  }
  .btn-bad:hover { background: rgba(194,94,74,0.2); }
  .btn-ok {
    background: rgba(139,168,136,0.14);
    color: var(--sage-bright);
    border: 0.5px solid rgba(139,168,136,0.4);
  }
  .btn-ok:hover { background: rgba(139,168,136,0.22); }
  .btn-bad:disabled, .btn-ok:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .btn-bad:disabled:hover { background: rgba(166,61,61,0.15); }
  .btn-ok:disabled:hover { background: rgba(107,142,78,0.15); }

  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .nav-btn {
    flex: 1;
    background: transparent;
    border: 1px solid rgba(244,234,213,0.2);
    color: var(--paper);
    padding: 12px;
    border-radius: 10px;
    font-family: var(--sys-font);
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover { border-color: var(--gold); color: var(--gold); }

  .backup-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
  }
  .backup-row label {
    cursor: pointer;
    display: block;
  }

  .reset-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: var(--sys-font);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 20px;
    display: block;
    margin: 0 auto;
    text-decoration: underline;
    text-decoration-color: rgba(138,131,120,0.3);
  }
  .reset-btn:hover { color: var(--accent-soft); }

  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-big {
    font-family: var(--sys-font);
    font-size: 56px;
    font-weight: 300;
    color: var(--gold);
    margin-bottom: 12px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">Flash<span>·</span>cards</div>
    <div class="sub" id="saveStatus">Yuran / EN</div>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="sTotal">0</div><div class="stat-label">Deck</div></div>
    <div class="stat"><div class="stat-num" id="sDone">0</div><div class="stat-label">Seen</div></div>
    <div class="stat"><div class="stat-num ok" id="sOk">0</div><div class="stat-label">Got it</div></div>
    <div class="stat"><div class="stat-num gold" id="sMastered">0</div><div class="stat-label">★ Master</div></div>
  </div>

  <div class="filters" id="filters"></div>

  <div class="progress" id="progressText">0 / 0</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <div id="cardArea">
    <div class="card-stage">
      <div class="card" id="card" onclick="toggleReveal()">
        <div class="accent-line"></div>
        <div class="card-tag" id="cardTag">—</div>
        <div class="card-main">
          <div class="card-content" id="cardContent">
            <div id="promptText" class="prompt-text">—</div>
            <div id="answerBlock" style="display:none;">
              <div id="answerText" class="answer-text">—</div>
              <div class="example" id="exampleText"></div>
              <div class="note" id="noteText"></div>
            </div>
          </div>
        </div>
        <div class="hint-tap" id="hintTap">Tap to show answer</div>
      </div>
    </div>

    <div class="actions" id="flipActions">
      <button class="btn btn-bad" id="btnBad" onclick="mark(false)">✗ Again</button>
      <button class="btn btn-ok" id="btnOk" onclick="mark(true)">✓ Got it</button>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="prevCard()">← Prev</button>
      <button class="nav-btn" id="dirToggle" onclick="toggleDirection()">KR → EN</button>
      <button class="nav-btn" onclick="nextCard()">Next →</button>
    </div>
    <div class="nav-row" style="margin-top:10px;">
      <button class="nav-btn" onclick="shuffleDeck()" style="flex:1;">⤭ Shuffle</button>
    </div>
  </div>

  <div class="backup-row">
    <button class="nav-btn" onclick="exportProgress()">↓ Export</button>
    <label class="nav-btn" style="text-align:center;">
      ↑ Import
      <input type="file" accept="application/json" onchange="importProgress(event)" style="display:none;">
    </label>
  </div>

  <button class="reset-btn" onclick="resetProgress()">Reset progress</button>
</div>

<script>
// ===== DECK =====
const DECK = [
  // ===== Weak points (Error Log) =====
  {k:"다른 주제로 넘어가도 돼?", e:"Can we move to another topic?", ex:"Can we move to another topic? I'm getting tired of this one.", note:"a/an + 단수명사. 'other topic' ✗", c:"weak"},
  {k:"좋은 도구인 것 같아", e:"NotebookLM is a great tool", ex:"NotebookLM is a great tool for organizing research.", note:"셀 수 있는 단수명사 앞엔 a/an", c:"weak"},
  {k:"내 시스템에 어떻게 활용?", e:"How can I use it for my system?", ex:"How can I use it for my learning system?", note:"use FOR 목적. to ✗", c:"weak"},
  {k:"연동할 수 있어?", e:"Can you link to NotebookLM?", ex:"Can you link this to NotebookLM directly?", note:"link TO / connect TO / integrate WITH", c:"weak"},
  {k:"Cowork 기능", e:"the Cowork feature", ex:"The Cowork feature lets you share documents in real time.", note:"특정 기능 지칭 = the", c:"weak"},
  {k:"3시에", e:"at 3pm", ex:"Let's meet at 3pm tomorrow.", note:"at 시간 / on 날짜 / in 월·연도", c:"weak"},
  {k:"스프레드시트에 쓰면", e:"If I update my Google Sheet", ex:"If I update my Google Sheet, will it sync automatically?", note:"소프트웨어 안 = in", c:"weak"},
  {k:"데이터를 받아?", e:"Does NotebookLM also get the data?", ex:"Does NotebookLM also get the data when I update the source?", note:"does + 동사원형 (gets ✗)", c:"weak"},
  {k:"트레킹 할 것 같아 (미확정)", e:"I'd probably go trekking", ex:"If I had a free weekend, I'd probably go trekking in the mountains.", note:"would = 미확정, will = 확정", c:"weak"},
  {k:"트레킹 하러 가다", e:"go trekking", ex:"We're going trekking this weekend.", note:"go + -ing (go for trekking ✗)", c:"weak"},
  {k:"더 많은 걸 느껴 (과정)", e:"I feel more through trekking than through reading", ex:"I feel more through trekking than through reading about it.", note:"through = 과정, from = 원인", c:"weak"},
  {k:"나 이제 요가 안 해", e:"I don't do yoga anymore", ex:"I don't do yoga anymore — I switched to pilates.", note:"anymore 한 단어로", c:"weak"},
  {k:"3시로 바꾸자", e:"Can we push it to 3 instead?", ex:"Can we push it to 3 instead? Something came up.", note:"push IT to — it 필수", c:"weak"},
  {k:"그만 생각해 (stop + ~ing)", e:"I can't stop thinking about it", ex:"I can't stop thinking about that problem.", note:"stop + ~ing (stop to ✗)", c:"weak"},
  {k:"사무실이 10분 거리야", e:"My office is ten minutes away", ex:"My office is ten minutes away from my apartment.", note:"10 minutes away (far 불필요)", c:"weak"},
  {k:"집에 일찍 왔어", e:"I came home early", ex:"I came home early because I wasn't feeling well.", note:"come home (back 불필요)", c:"weak"},
  {k:"나 자신을 성찰하다", e:"I can't reflect on myself", ex:"I need time to reflect on myself before making a decision.", note:"reflect ON (자동사)", c:"weak"},
  {k:"동기는 문제에서 온다", e:"Motivation usually comes from a problem", ex:"Motivation usually comes from a problem you've faced yourself.", note:"comes (현재) / a + 명사", c:"weak"},
  {k:"시장이 준비가 안 됨", e:"The market isn't ready for that", ex:"The market isn't ready for that yet — maybe in a few years.", note:"the + market", c:"weak"},
  {k:"재밌는 거 얘기하자", e:"Let's chat about something fun", ex:"Let's chat about something fun instead of work.", note:"chat ABOUT + 주제", c:"weak"},
  {k:"팔 생각이었어", e:"I was thinking of selling", ex:"I was thinking of selling it to a feed company.", note:"think of + ~ing", c:"weak"},
  {k:"가공해서 다른 제품으로", e:"process it into other products", ex:"We could process it into other products like powder or snacks.", note:"process INTO / turn INTO", c:"weak"},
  {k:"냉동으로 팔아", e:"I sell it frozen", ex:"I already sell it frozen to restaurants.", note:"sell + 목적어 + 상태", c:"weak"},
  {k:"작은 목표만 있어", e:"I only have small goals", ex:"I only have small goals right now — nothing ambitious.", note:"복수형 goals", c:"weak"},
  {k:"Initiative 필요해", e:"I need bigger initiatives", ex:"I need bigger initiatives to feel challenged.", note:"the 불필요", c:"weak"},
  {k:"새 프로젝트 찾기", e:"finding a new project", ex:"I'm finding a new project to work on this quarter.", note:"a + 단수명사", c:"weak"},
  {k:"팀 만드는 법 배우기", e:"learn how to build a team", ex:"I want to learn how to build a team from scratch.", note:"build a team", c:"weak"},
  {k:"1년은 긴 시간이야", e:"A year is a long time", ex:"A year is a long time to stay in one place.", note:"a + year / a + long time", c:"weak"},
  {k:"문화 없으면 지루 (가정)", e:"I'd get bored without any cultural things", ex:"I'd get bored without any cultural things to do.", note:"would / without any (이중부정 ❌)", c:"weak"},
  {k:"한국에 수입할", e:"import to Korea", ex:"I want to import these products to Korea.", note:"import TO (목적지)", c:"weak"},
  {k:"좋은 호텔에 머물 거야", e:"I'd stay at a nice hotel", ex:"If I had the budget, I'd stay at a nice hotel.", note:"stay AT + 장소 / would", c:"weak"},
  {k:"완벽한 문장 만들 때", e:"when I make a perfect sentence", ex:"I feel great when I make a perfect sentence in English.", note:"a + 단수명사", c:"weak"},
  {k:"샤워하고 잘게", e:"I'll take a shower and go to bed", ex:"I'll take a shower and go to bed early tonight.", note:"a shower / go to bed", c:"weak"},

  // ===== Time / scheduling =====
  {k:"시간 앞당기다", e:"Can we move it up to 1?", ex:"Can we move it up to 1? I have another meeting at 3.", note:"move it up to [시간]", c:"daily"},
  {k:"3시로 하자 (캐주얼)", e:"Let's make it 3", ex:"Let's make it 3 then — works for me.", note:"make it [시간]", c:"daily"},
  {k:"늦고 있어", e:"I'm running late", ex:"I'm running late — I'll be there in 10 minutes.", note:"running late", c:"daily"},
  {k:"미팅이 길어졌어", e:"My meeting ran over", ex:"Sorry I'm late — my meeting ran over.", note:"run over = 예정보다 길어지다", c:"biz"},
  {k:"혹시 ~하면 문자해줘", e:"In case your meeting runs over, just text me", ex:"In case your meeting runs over, just text me and we'll reschedule.", note:"In case [상황], just [행동]", c:"daily"},
  {k:"편하게 알려줘", e:"Feel free to let me know", ex:"Feel free to let me know if you need anything.", note:"Feel free to + 동사원형", c:"daily"},
  {k:"걱정 말고", e:"No worries — take your time", ex:"No worries — take your time and let me know when you're ready.", note:"no worries / no pressure / no rush", c:"daily"},
  {k:"문자 보내줘 (캐주얼)", e:"Shoot me a text", ex:"Shoot me a text when you're heading over.", note:"shoot > send (캐주얼)", c:"daily"},
  {k:"소식 계속 알려줘", e:"Keep me posted", ex:"Keep me posted on how the project goes.", note:"Keep me posted (on ~)", c:"daily"},
  {k:"연락해! (캐주얼)", e:"Hit me up if you're free", ex:"Hit me up if you're free this weekend.", note:"hit me up = 연락하다", c:"daily"},
  {k:"오늘 정말 즐거웠어!", e:"I had a blast today!", ex:"I had a blast today — we should do this again.", note:"had a blast > had fun", c:"daily"},
  {k:"도착하면 알려줘", e:"Let me know when you land", ex:"Let me know when you land so I can pick you up.", note:"land = 도착 (비행)", c:"daily"},
  {k:"나는 ~형 인간이야", e:"I'm more of a morning person", ex:"I'm more of a morning person — I can't focus at night.", note:"I'm more of a ~ person", c:"daily"},
  {k:"기대에 비해 밋밋한", e:"The launch was underwhelming", ex:"Honestly, the launch was a bit underwhelming.", note:"↔ overwhelming", c:"biz"},
  {k:"못 들었어 / 놓쳤어", e:"I didn't catch that", ex:"Sorry, I didn't catch that — could you repeat it?", note:"I didn't catch + 명사", c:"daily"},

const CATEGORIES = [
  {id:"all", label:"All"},
  {id:"weakonly", label:"⚡ Struggling"},
  {id:"weak", label:"★ Weak points"},
  {id:"biz", label:"Business"},
  {id:"meet", label:"Meetings"},
  {id:"article", label:"Article Active"},
  {id:"passive", label:"Article Passive"},
  {id:"slang", label:"Slang"},
  {id:"relate", label:"💛 Relationships"},
  {id:"genz", label:"Gen Z reactions"},
  {id:"daily", label:"Daily"},
  {id:"idiom", label:"Idioms"},
  {id:"cafe", label:"Cafe"},
];

// ===== STATE =====
let state = {
  filter: "all",
  direction: "krEn",
  order: [],
  idx: 0,
  revealed: false,
  marks: {},
};

// ===== Storage =====
const STORAGE_KEY = "flashcards_yuran_v4";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved.filter) state.filter = saved.filter;
      if (saved.direction) state.direction = saved.direction;
      if (saved.marks) state.marks = saved.marks;
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      filter: state.filter,
      direction: state.direction,
      marks: state.marks,
    }));
    showSaveStatus("✓ saved");
  } catch(e) {
    showSaveStatus("✗ " + (e.message || e));
  }
}

function exportProgress() {
  const data = JSON.stringify({
    filter: state.filter,
    direction: state.direction,
    marks: state.marks,
    exported: new Date().toISOString(),
  }, null, 2);
  const blob = new Blob([data], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "flashcards-progress.json";
  a.click();
  URL.revokeObjectURL(url);
  showSaveStatus("✓ exported");
}

function importProgress(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const saved = JSON.parse(e.target.result);
      if (saved.filter) state.filter = saved.filter;
      if (saved.direction) state.direction = saved.direction;
      if (saved.marks) state.marks = saved.marks;
      buildOrder();
      render();
      saveState();
      showSaveStatus("✓ imported");
    } catch(err) {
      showSaveStatus("✗ invalid file");
    }
  };
  reader.readAsText(file);
  ev.target.value = "";
}

function showSaveStatus(msg) {
  const el = document.getElementById("saveStatus");
  if (el) {
    el.textContent = msg;
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.textContent = ""; }, 1500);
  }
}

function getFilteredIndices() {
  const idxs = [];
  DECK.forEach((card, i) => {
    if (state.filter === "all") {
      idxs.push(i);
    } else if (state.filter === "weakonly") {
      // Cards with bad result or no streak, in current direction
      const m = (state.marks[i] || {})[state.direction];
      if (m && typeof m === "object") {
        if (m.result === "bad" || (m.streak || 0) === 0) {
          // only include if they've been seen at least once as "bad"
          if (m.result === "bad") idxs.push(i);
        }
      }
    } else if (card.c === state.filter) {
      idxs.push(i);
    }
  });
  return idxs;
}

function buildOrder() {
  const idxs = getFilteredIndices();
  // Filter out mastered cards probabilistically
  const weighted = idxs.filter(i => {
    const streak = getStreak(i);
    const skipProb = getSkipProbability(streak);
    return Math.random() >= skipProb;
  });
  // If filtering left us with too few, fall back to full list
  const finalIdxs = weighted.length >= Math.min(5, idxs.length) ? weighted : idxs;
  // shuffle
  for (let i = finalIdxs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [finalIdxs[i], finalIdxs[j]] = [finalIdxs[j], finalIdxs[i]];
  }
  state.order = finalIdxs;
  state.idx = 0;
  state.revealed = false;
}

function renderFilters() {
  const el = document.getElementById("filters");
  el.innerHTML = "";
  CATEGORIES.forEach(cat => {
    let count;
    if (cat.id === "all") {
      count = DECK.length;
    } else if (cat.id === "weakonly") {
      count = 0;
      DECK.forEach((_, i) => {
        const m = (state.marks[i] || {})[state.direction];
        if (m && typeof m === "object" && m.result === "bad") count++;
      });
    } else {
      count = DECK.filter(c => c.c === cat.id).length;
    }
    const btn = document.createElement("button");
    btn.className = "chip" + (state.filter === cat.id ? " active" : "");
    btn.textContent = `${cat.label} (${count})`;
    btn.onclick = () => {
      state.filter = cat.id;
      buildOrder();
      render();
      saveState();
    };
    el.appendChild(btn);
  });
}

function currentCard() {
  if (!state.order.length) return null;
  const deckIdx = state.order[state.idx];
  return { card: DECK[deckIdx], deckIdx };
}

function render() {
  renderFilters();
  const area = document.getElementById("cardArea");

  if (!state.order.length) {
    area.innerHTML = `<div class="empty"><div class="empty-big">∅</div>No cards in this category</div>`;
    updateStats();
    return;
  }

  // Ensure card HTML exists
  if (!document.getElementById("card")) {
    location.reload();
    return;
  }

  const { card, deckIdx } = currentCard();
  const catLabel = CATEGORIES.find(c => c.id === card.c)?.label || card.c;
  const result = getResult(deckIdx);
  const streak = getStreak(deckIdx);
  let markBadge = "";
  if (result === "ok") {
    markBadge = streak >= 4 ? " · ★ mastered" : " · ✓" + (streak > 1 ? `×${streak}` : "");
  } else if (result === "bad") {
    markBadge = " · ✗";
  }
  const dirBadge = state.direction === "krEn" ? " · KR→EN" : " · EN→KR";

  document.getElementById("cardTag").textContent = catLabel + dirBadge + markBadge;

  // Direction-aware content
  const promptEl = document.getElementById("promptText");
  const answerEl = document.getElementById("answerText");
  if (state.direction === "krEn") {
    promptEl.textContent = card.k;
    answerEl.textContent = card.e;
  } else {
    promptEl.textContent = card.e;
    answerEl.textContent = card.k;
  }
  // Prompt font size — English is smaller since it's longer
  promptEl.style.fontSize = state.direction === "krEn" ? "36px" : "32px";

  // Example + note
  const exEl = document.getElementById("exampleText");
  const noteEl = document.getElementById("noteText");
  if (card.ex) {
    exEl.textContent = card.ex;
    exEl.style.display = "";
  } else {
    exEl.style.display = "none";
  }
  if (card.note) {
    noteEl.textContent = card.note;
    noteEl.style.display = "";
  } else {
    noteEl.style.display = "none";
  }

  // Apply revealed state
  const cardEl = document.getElementById("card");
  const answerBlock = document.getElementById("answerBlock");
  const hintEl = document.getElementById("hintTap");
  if (state.revealed) {
    cardEl.classList.add("revealed");
    answerBlock.style.display = "";
    hintEl.textContent = "Tap to hide";
  } else {
    cardEl.classList.remove("revealed");
    answerBlock.style.display = "none";
    hintEl.textContent = "Tap to show answer";
  }

  // direction toggle button state
  const toggleBtn = document.getElementById("dirToggle");
  if (toggleBtn) {
    toggleBtn.textContent = state.direction === "krEn" ? "KR → EN" : "EN → KR";
  }

  // progress
  document.getElementById("progressText").textContent = `${state.idx + 1} / ${state.order.length}`;
  const pct = ((state.idx + 1) / state.order.length) * 100;
  document.getElementById("progressFill").style.width = pct + "%";

  updateStats();
}

function updateStats() {
  const filtered = getFilteredIndices();
  let seen = 0, ok = 0, bad = 0, mastered = 0;
  filtered.forEach(i => {
    const r = getResult(i);
    const s = getStreak(i);
    if (r) {
      seen++;
      if (r === "ok") ok++;
      else bad++;
      if (s >= 4) mastered++;
    }
  });
  document.getElementById("sTotal").textContent = filtered.length;
  document.getElementById("sDone").textContent = seen;
  document.getElementById("sOk").textContent = ok;
  const bEl = document.getElementById("sBad");
  if (bEl) bEl.textContent = bad;
  const mEl = document.getElementById("sMastered");
  if (mEl) mEl.textContent = mastered;
}

function toggleReveal() {
  state.revealed = !state.revealed;
  render();
}

function nextCard() {
  if (!state.order.length) return;
  state.idx = (state.idx + 1) % state.order.length;
  state.revealed = false;
  render();
  saveState();
}

function prevCard() {
  if (!state.order.length) return;
  state.idx = (state.idx - 1 + state.order.length) % state.order.length;
  state.revealed = false;
  render();
  saveState();
}

// Mastery thresholds
// streak 0-1: normal frequency
// streak 2: 50% chance to skip
// streak 3: 75% chance to skip
// streak 4+: 90% chance to skip (mastered)
function getSkipProbability(streak) {
  if (!streak || streak < 2) return 0;
  if (streak === 2) return 0.5;
  if (streak === 3) return 0.75;
  return 0.9;
}

function getMark(deckIdx) {
  const m = state.marks[deckIdx];
  if (!m) return null;
  return m[state.direction] || null;
}

function getStreak(deckIdx) {
  const mark = getMark(deckIdx);
  if (!mark || typeof mark !== "object") return 0;
  return mark.streak || 0;
}

function getResult(deckIdx) {
  const mark = getMark(deckIdx);
  if (!mark) return null;
  // legacy format: string "ok" or "bad"
  if (typeof mark === "string") return mark;
  return mark.result || null;
}

function mark(ok) {
  const cur = currentCard();
  if (!cur) return;
  if (!state.marks[cur.deckIdx]) state.marks[cur.deckIdx] = {};
  const prev = state.marks[cur.deckIdx][state.direction];
  let prevStreak = 0;
  if (prev && typeof prev === "object") prevStreak = prev.streak || 0;
  
  state.marks[cur.deckIdx][state.direction] = {
    result: ok ? "ok" : "bad",
    streak: ok ? prevStreak + 1 : 0,
    updated: Date.now(),
  };
  saveState();
  // auto-advance
  setTimeout(() => nextCard(), 150);
}

function toggleDirection() {
  state.direction = state.direction === "krEn" ? "enKr" : "krEn";
  state.revealed = false;
  render();
  saveState();
}

function shuffleDeck() {
  buildOrder();
  render();
  saveState();
}

function resetProgress() {
  if (!confirm("진도/점수 전부 초기화할까?")) return;
  state.marks = {};
  buildOrder();
  render();
  saveState();
}

// Keyboard shortcuts
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT") return;
  if (e.key === " " || e.key === "Enter") { e.preventDefault(); toggleReveal(); }
  else if (e.key === "ArrowRight") nextCard();
  else if (e.key === "ArrowLeft") prevCard();
  else if (e.key === "1" || e.key.toLowerCase() === "x") mark(false);
  else if (e.key === "2" || e.key.toLowerCase() === "o") mark(true);
});

// Init
loadState();
if (!state.order.length) buildOrder();
render();
</script>
