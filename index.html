<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Flashcards — Yuran</title>
<style>
  :root {
    --sys-font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Apple SD Gothic Neo", sans-serif;
    --mono-font: "SF Mono", ui-monospace, Menlo, monospace;
    --bg: #1a1613;
    --bg-soft: #252019;
    --bg-elev: #2d2720;
    --paper: #f5ede0;
    --paper-dim: #e8dcc7;
    --ink: #1f1a14;
    --ink-soft: #3a3128;
    --accent: #cc7b5c;
    --accent-bright: #e89274;
    --accent-soft: #f2a88c;
    --gold: #d4a574;
    --sage: #8ba888;
    --sage-bright: #a8c5a0;
    --mist: #b8a898;
    --muted: #8c7f70;
    --success: #8ba888;
    --error: #c25e4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--paper);
    font-family: var(--sys-font);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(204,123,92,0.12), transparent 55%),
      radial-gradient(ellipse at 80% 90%, rgba(139,168,136,0.08), transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(212,165,116,0.05), transparent 60%);
    padding: 20px 16px 60px;
  }
  .wrap { max-width: 560px; margin: 0 auto; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(244,234,213,0.15);
  }
  .logo {
    font-family: var(--sys-font);
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.03em;
  }
  .logo span { color: var(--accent-bright); }
  .sub {
    font-family: var(--mono-font);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .stat {
    background: var(--bg-soft);
    border: 0.5px solid rgba(245,237,224,0.08);
    padding: 12px 8px;
    border-radius: 10px;
    text-align: center;
  }
  .stat-num {
    font-family: var(--sys-font);
    font-weight: 600;
    font-size: 24px;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .stat-num.ok { color: var(--success); }
  .stat-num.bad { color: var(--accent-soft); }
  .stat-num.gold { color: var(--gold); }
  .stat-label {
    font-family: var(--mono-font);
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
  }

  .filters {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 16px;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    background: transparent;
    border: 0.5px solid rgba(245,237,224,0.2);
    color: var(--paper);
    padding: 8px 14px;
    border-radius: 999px;
    font-family: var(--sys-font);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: -0.01em;
  }
  .chip:hover { border-color: var(--gold); color: var(--gold); }
  .chip.active {
    background: var(--accent);
    color: var(--paper);
    border-color: var(--accent);
    font-weight: 500;
  }

  .progress {
    font-family: var(--mono-font);
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 10px;
    letter-spacing: 0.08em;
  }
  .progress-bar {
    height: 2px;
    background: rgba(245,237,224,0.08);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold), var(--sage));
    transition: width 0.4s ease;
  }

  .card-stage { margin-bottom: 24px; }
  .card {
    position: relative;
    width: 100%;
    min-height: 400px;
    background: var(--paper);
    color: var(--ink);
    border-radius: 16px;
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.2);
    cursor: pointer;
    background-image:
      radial-gradient(circle at 15% 15%, rgba(212,165,116,0.18), transparent 55%),
      radial-gradient(circle at 85% 85%, rgba(204,123,92,0.1), transparent 55%),
      radial-gradient(circle at 50% 100%, rgba(139,168,136,0.08), transparent 50%);
    transition: background 0.25s ease;
  }
  .card.revealed {
    background: var(--bg-elev);
    color: var(--paper);
    background-image:
      radial-gradient(circle at 20% 20%, rgba(204,123,92,0.14), transparent 55%),
      radial-gradient(circle at 80% 80%, rgba(139,168,136,0.1), transparent 55%),
      linear-gradient(180deg, rgba(212,165,116,0.05), transparent 60%);
    border: 0.5px solid rgba(212,165,116,0.2);
  }
  .card-tag {
    font-family: var(--mono-font);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #9a8f7c;
  }
  .card.revealed .card-tag { color: var(--muted); }
  .card-main {
    flex-grow: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px 0;
  }
  .card-content { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .prompt-text {
    font-family: var(--sys-font);
    font-size: 36px;
    font-weight: 600;
    line-height: 1.35;
    letter-spacing: -0.02em;
    color: inherit;
  }
  .answer-text {
    font-family: var(--sys-font);
    font-size: 32px;
    font-weight: 500;
    line-height: 1.3;
    letter-spacing: -0.02em;
    color: inherit;
  }
  .example {
    font-family: var(--sys-font);
    font-size: 15px;
    font-weight: 400;
    color: var(--gold);
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px dashed rgba(212,165,116,0.3);
    line-height: 1.5;
    letter-spacing: -0.01em;
  }
  .note {
    font-family: var(--sys-font);
    font-size: 12px;
    font-weight: 400;
    color: var(--mist);
    margin-top: 8px;
    line-height: 1.5;
    letter-spacing: -0.01em;
  }
  .hint-tap {
    text-align: center;
    font-family: var(--mono-font);
    font-size: 9px;
    color: #aaa095;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .card.revealed .hint-tap { color: var(--muted); }
  .accent-line {
    position: absolute;
    top: 0;
    left: 28px;
    right: 28px;
    height: 2px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--gold) 50%, var(--sage) 100%);
    border-radius: 0 0 2px 2px;
    opacity: 0.85;
  }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .btn {
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-family: var(--sys-font);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: -0.01em;
  }
  .btn:active { transform: scale(0.97); }
  .btn-bad {
    background: rgba(194,94,74,0.12);
    color: #e8a090;
    border: 0.5px solid rgba(194,94,74,0.35);
  }
  .btn-bad:hover { background: rgba(194,94,74,0.2); }
  .btn-ok {
    background: rgba(139,168,136,0.14);
    color: var(--sage-bright);
    border: 0.5px solid rgba(139,168,136,0.4);
  }
  .btn-ok:hover { background: rgba(139,168,136,0.22); }
  .btn-bad:disabled, .btn-ok:disabled { opacity: 0.35; cursor: not-allowed; }

  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .nav-btn {
    flex: 1;
    background: transparent;
    border: 1px solid rgba(244,234,213,0.2);
    color: var(--paper);
    padding: 12px;
    border-radius: 10px;
    font-family: var(--sys-font);
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover { border-color: var(--gold); color: var(--gold); }

  .backup-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
  }
  .backup-row label { cursor: pointer; display: block; }

  .reset-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: var(--sys-font);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 20px;
    display: block;
    margin: 0 auto;
    text-decoration: underline;
    text-decoration-color: rgba(138,131,120,0.3);
  }
  .reset-btn:hover { color: var(--accent-soft); }

  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-big {
    font-family: var(--sys-font);
    font-size: 56px;
    font-weight: 300;
    color: var(--gold);
    margin-bottom: 12px;
  }

  /* Loading screen */
  #loadingScreen {
    text-align: center;
    padding: 80px 20px;
  }
  #loadingScreen .loading-icon {
    font-size: 40px;
    margin-bottom: 16px;
    animation: spin 1.5s linear infinite;
    display: inline-block;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  #loadingScreen .loading-text {
    font-family: var(--mono-font);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  #loadingScreen .error-text {
    font-family: var(--sys-font);
    font-size: 14px;
    color: var(--accent-soft);
    margin-top: 8px;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">Flash<span>·</span>cards</div>
    <div class="sub" id="saveStatus">Yuran / EN</div>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="sTotal">0</div><div class="stat-label">Deck</div></div>
    <div class="stat"><div class="stat-num" id="sDone">0</div><div class="stat-label">Seen</div></div>
    <div class="stat"><div class="stat-num ok" id="sOk">0</div><div class="stat-label">Got it</div></div>
    <div class="stat"><div class="stat-num gold" id="sMastered">0</div><div class="stat-label">★ Master</div></div>
  </div>

  <div class="filters" id="filters"></div>

  <div class="progress" id="progressText">0 / 0</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <!-- Loading screen (shown while fetching) -->
  <div id="loadingScreen">
    <div class="loading-icon">◌</div>
    <div class="loading-text">덱 불러오는 중...</div>
    <div class="error-text" id="loadingError" style="display:none;"></div>
  </div>

  <!-- Card area (hidden until deck loads) -->
  <div id="cardArea" style="display:none;">
    <div class="card-stage">
      <div class="card" id="card" onclick="toggleReveal()">
        <div class="accent-line"></div>
        <div class="card-tag" id="cardTag">—</div>
        <div class="card-main">
          <div class="card-content" id="cardContent">
            <div id="promptText" class="prompt-text">—</div>
            <div id="answerBlock" style="display:none;">
              <div id="answerText" class="answer-text">—</div>
              <div class="example" id="exampleText"></div>
              <div class="note" id="noteText"></div>
            </div>
          </div>
        </div>
        <div class="hint-tap" id="hintTap">Tap to show answer</div>
      </div>
    </div>

    <div class="actions" id="flipActions">
      <button class="btn btn-bad" id="btnBad" onclick="mark(false)">✗ Again</button>
      <button class="btn btn-ok" id="btnOk" onclick="mark(true)">✓ Got it</button>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="prevCard()">← Prev</button>
      <button class="nav-btn" id="dirToggle" onclick="toggleDirection()">KR → EN</button>
      <button class="nav-btn" onclick="nextCard()">Next →</button>
    </div>
    <div class="nav-row" style="margin-top:10px;">
      <button class="nav-btn" onclick="shuffleDeck()" style="flex:1;">⤭ Shuffle</button>
    </div>
  </div>

  <div class="backup-row">
    <button class="nav-btn" onclick="exportProgress()">↓ Export</button>
    <label class="nav-btn" style="text-align:center;">
      ↑ Import
      <input type="file" accept="application/json" onchange="importProgress(event)" style="display:none;">
    </label>
    <button class="nav-btn" onclick="copyMasterList()" title="전체 목록을 Claude에 붙여넣기용으로 복사">📋 목록복사</button>
  </div>

  <button class="reset-btn" onclick="resetProgress()">Reset progress</button>
</div>

<script>
// ================================================================
// ★ 여기만 바꾸면 됨: Google Sheets 웹에 게시 CSV URL
// ================================================================
const SHEETS_CSV_URL = "YOUR_SHEETS_CSV_URL_HERE";
// 형식: https://docs.google.com/spreadsheets/d/XXXXXXX/pub?gid=0&single=true&output=csv
// ================================================================

const CATEGORIES = [
  {id:"all", label:"All"},
  {id:"weakonly", label:"⚡ Struggling"},
  {id:"weak", label:"★ Weak points"},
  {id:"biz", label:"Business"},
  {id:"meet", label:"Meetings"},
  {id:"article", label:"Article Active"},
  {id:"passive", label:"Article Passive"},
  {id:"slang", label:"Slang"},
  {id:"relate", label:"💛 Relationships"},
  {id:"genz", label:"Gen Z reactions"},
  {id:"daily", label:"Daily"},
  {id:"idiom", label:"Idioms"},
  {id:"cafe", label:"Cafe"},
];

// ===== DECK (동적 로드) =====
let DECK = [];

// ===== CSV 파싱 =====
function parseCSVLine(line) {
  const result = [];
  let cur = "", inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      result.push(cur); cur = "";
    } else {
      cur += ch;
    }
  }
  result.push(cur);
  return result;
}

async function loadDeck() {
  try {
    const res = await fetch(SHEETS_CSV_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const csv = await res.text();
    const lines = csv.trim().split('\n');
    const headers = parseCSVLine(lines[0]).map(h => h.trim().replace(/^"|"$/g, ''));
    DECK = lines.slice(1)
      .filter(l => l.trim())
      .map(line => {
        const vals = parseCSVLine(line);
        const obj = {};
        headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim(); });
        return obj;
      })
      .filter(card => card.k && card.e); // k, e 둘 다 있는 행만
    
    // 로딩 화면 숨기고 카드 영역 표시
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('cardArea').style.display = '';
    
    // 앱 초기화
    loadState();
    buildOrder();
    render();
  } catch (err) {
    console.error('Deck load failed:', err);
    document.querySelector('#loadingScreen .loading-icon').style.display = 'none';
    document.querySelector('#loadingScreen .loading-text').textContent = '덱 로드 실패';
    const errEl = document.getElementById('loadingError');
    errEl.style.display = '';
    errEl.textContent = '새로고침 해보거나, Sheets URL을 확인해주세요.\n오류: ' + err.message;
  }
}

// ===== 마스터 목록 복사 =====
function copyMasterList() {
  if (!DECK.length) { alert('덱이 아직 로드되지 않았습니다.'); return; }
  
  const lines = DECK.map((d, i) => {
    const mark = getMark(i);
    const streak = getStreak(i);
    const result = getResult(i);
    let status = "미학습";
    if (result === "ok") status = streak >= 4 ? "★마스터" : `✓(${streak}회)`;
    else if (result === "bad") status = "✗재학습";
    return `${i + 1}. [${d.c}] [${status}] ${d.k} → ${d.e}`;
  });

  const header = `[플래시카드 전체 목록 — ${DECK.length}장 / ${new Date().toLocaleDateString('ko-KR')}]\n${'─'.repeat(50)}\n`;
  const text = header + lines.join('\n');

  navigator.clipboard.writeText(text).then(() => {
    showSaveStatus(`✓ ${DECK.length}장 복사됨`);
  }).catch(() => {
    // 클립보드 실패 시 textarea 방식
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showSaveStatus(`✓ ${DECK.length}장 복사됨`);
  });
}

// ===== STATE =====
let state = {
  filter: "all",
  direction: "krEn",
  order: [],
  idx: 0,
  revealed: false,
  marks: {},
};

const STORAGE_KEY = "flashcards_yuran_v4";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved.filter) state.filter = saved.filter;
      if (saved.direction) state.direction = saved.direction;
      if (saved.marks) state.marks = saved.marks;
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      filter: state.filter,
      direction: state.direction,
      marks: state.marks,
    }));
    showSaveStatus("✓ saved");
  } catch(e) {
    showSaveStatus("✗ " + (e.message || e));
  }
}

function exportProgress() {
  const data = JSON.stringify({
    filter: state.filter,
    direction: state.direction,
    marks: state.marks,
    exported: new Date().toISOString(),
  }, null, 2);
  const blob = new Blob([data], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "flashcards-progress.json";
  a.click();
  URL.revokeObjectURL(url);
  showSaveStatus("✓ exported");
}

function importProgress(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const saved = JSON.parse(e.target.result);
      if (saved.filter) state.filter = saved.filter;
      if (saved.direction) state.direction = saved.direction;
      if (saved.marks) state.marks = saved.marks;
      buildOrder();
      render();
      saveState();
      showSaveStatus("✓ imported");
    } catch(err) {
      showSaveStatus("✗ invalid file");
    }
  };
  reader.readAsText(file);
  ev.target.value = "";
}

function showSaveStatus(msg) {
  const el = document.getElementById("saveStatus");
  if (el) {
    el.textContent = msg;
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.textContent = ""; }, 2000);
  }
}

function getFilteredIndices() {
  const idxs = [];
  DECK.forEach((card, i) => {
    if (state.filter === "all") {
      idxs.push(i);
    } else if (state.filter === "weakonly") {
      const m = (state.marks[i] || {})[state.direction];
      if (m && typeof m === "object" && m.result === "bad") idxs.push(i);
    } else if (card.c === state.filter) {
      idxs.push(i);
    }
  });
  return idxs;
}

function buildOrder() {
  const idxs = getFilteredIndices();
  const weighted = idxs.filter(i => {
    const streak = getStreak(i);
    const skipProb = getSkipProbability(streak);
    return Math.random() >= skipProb;
  });
  const finalIdxs = weighted.length >= Math.min(5, idxs.length) ? weighted : idxs;
  for (let i = finalIdxs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [finalIdxs[i], finalIdxs[j]] = [finalIdxs[j], finalIdxs[i]];
  }
  state.order = finalIdxs;
  state.idx = 0;
  state.revealed = false;
}

function renderFilters() {
  const el = document.getElementById("filters");
  el.innerHTML = "";
  CATEGORIES.forEach(cat => {
    let count;
    if (cat.id === "all") {
      count = DECK.length;
    } else if (cat.id === "weakonly") {
      count = 0;
      DECK.forEach((_, i) => {
        const m = (state.marks[i] || {})[state.direction];
        if (m && typeof m === "object" && m.result === "bad") count++;
      });
    } else {
      count = DECK.filter(c => c.c === cat.id).length;
    }
    const btn = document.createElement("button");
    btn.className = "chip" + (state.filter === cat.id ? " active" : "");
    btn.textContent = `${cat.label} (${count})`;
    btn.onclick = () => {
      state.filter = cat.id;
      buildOrder();
      render();
      saveState();
    };
    el.appendChild(btn);
  });
}

function currentCard() {
  if (!state.order.length) return null;
  const deckIdx = state.order[state.idx];
  return { card: DECK[deckIdx], deckIdx };
}

function render() {
  renderFilters();
  const area = document.getElementById("cardArea");

  if (!state.order.length) {
    area.innerHTML = `<div class="empty"><div class="empty-big">∅</div>No cards in this category</div>`;
    updateStats();
    return;
  }

  if (!document.getElementById("card")) { location.reload(); return; }

  const { card, deckIdx } = currentCard();
  const catLabel = CATEGORIES.find(c => c.id === card.c)?.label || card.c;
  const result = getResult(deckIdx);
  const streak = getStreak(deckIdx);
  let markBadge = "";
  if (result === "ok") {
    markBadge = streak >= 4 ? " · ★ mastered" : " · ✓" + (streak > 1 ? `×${streak}` : "");
  } else if (result === "bad") {
    markBadge = " · ✗";
  }
  const dirBadge = state.direction === "krEn" ? " · KR→EN" : " · EN→KR";

  document.getElementById("cardTag").textContent = catLabel + dirBadge + markBadge;

  const promptEl = document.getElementById("promptText");
  const answerEl = document.getElementById("answerText");
  if (state.direction === "krEn") {
    promptEl.textContent = card.k;
    answerEl.textContent = card.e;
  } else {
    promptEl.textContent = card.e;
    answerEl.textContent = card.k;
  }
  promptEl.style.fontSize = state.direction === "krEn" ? "36px" : "32px";

  const exEl = document.getElementById("exampleText");
  const noteEl = document.getElementById("noteText");
  if (card.ex) { exEl.textContent = card.ex; exEl.style.display = ""; }
  else { exEl.style.display = "none"; }
  if (card.note) { noteEl.textContent = card.note; noteEl.style.display = ""; }
  else { noteEl.style.display = "none"; }

  const cardEl = document.getElementById("card");
  const answerBlock = document.getElementById("answerBlock");
  const hintEl = document.getElementById("hintTap");
  if (state.revealed) {
    cardEl.classList.add("revealed");
    answerBlock.style.display = "";
    hintEl.textContent = "Tap to hide";
  } else {
    cardEl.classList.remove("revealed");
    answerBlock.style.display = "none";
    hintEl.textContent = "Tap to show answer";
  }

  const toggleBtn = document.getElementById("dirToggle");
  if (toggleBtn) toggleBtn.textContent = state.direction === "krEn" ? "KR → EN" : "EN → KR";

  document.getElementById("progressText").textContent = `${state.idx + 1} / ${state.order.length}`;
  const pct = ((state.idx + 1) / state.order.length) * 100;
  document.getElementById("progressFill").style.width = pct + "%";

  updateStats();
}

function updateStats() {
  const filtered = getFilteredIndices();
  let seen = 0, ok = 0, mastered = 0;
  filtered.forEach(i => {
    const r = getResult(i);
    const s = getStreak(i);
    if (r) {
      seen++;
      if (r === "ok") ok++;
      if (s >= 4) mastered++;
    }
  });
  document.getElementById("sTotal").textContent = filtered.length;
  document.getElementById("sDone").textContent = seen;
  document.getElementById("sOk").textContent = ok;
  const mEl = document.getElementById("sMastered");
  if (mEl) mEl.textContent = mastered;
}

function toggleReveal() {
  state.revealed = !state.revealed;
  render();
}

function nextCard() {
  if (!state.order.length) return;
  state.idx = (state.idx + 1) % state.order.length;
  state.revealed = false;
  render();
  saveState();
}

function prevCard() {
  if (!state.order.length) return;
  state.idx = (state.idx - 1 + state.order.length) % state.order.length;
  state.revealed = false;
  render();
  saveState();
}

function getSkipProbability(streak) {
  if (!streak || streak < 2) return 0;
  if (streak === 2) return 0.5;
  if (streak === 3) return 0.75;
  return 0.9;
}

function getMark(deckIdx) {
  const m = state.marks[deckIdx];
  if (!m) return null;
  return m[state.direction] || null;
}

function getStreak(deckIdx) {
  const mark = getMark(deckIdx);
  if (!mark || typeof mark !== "object") return 0;
  return mark.streak || 0;
}

function getResult(deckIdx) {
  const mark = getMark(deckIdx);
  if (!mark) return null;
  if (typeof mark === "string") return mark;
  return mark.result || null;
}

function mark(ok) {
  const cur = currentCard();
  if (!cur) return;
  if (!state.marks[cur.deckIdx]) state.marks[cur.deckIdx] = {};
  const prev = state.marks[cur.deckIdx][state.direction];
  let prevStreak = 0;
  if (prev && typeof prev === "object") prevStreak = prev.streak || 0;
  state.marks[cur.deckIdx][state.direction] = {
    result: ok ? "ok" : "bad",
    streak: ok ? prevStreak + 1 : 0,
    updated: Date.now(),
  };
  saveState();
  setTimeout(() => nextCard(), 150);
}

function toggleDirection() {
  state.direction = state.direction === "krEn" ? "enKr" : "krEn";
  state.revealed = false;
  render();
  saveState();
}

function shuffleDeck() {
  buildOrder();
  render();
  saveState();
}

function resetProgress() {
  if (!confirm("진도/점수 전부 초기화할까?")) return;
  state.marks = {};
  buildOrder();
  render();
  saveState();
}

document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT") return;
  if (e.key === " " || e.key === "Enter") { e.preventDefault(); toggleReveal(); }
  else if (e.key === "ArrowRight") nextCard();
  else if (e.key === "ArrowLeft") prevCard();
  else if (e.key === "1" || e.key.toLowerCase() === "x") mark(false);
  else if (e.key === "2" || e.key.toLowerCase() === "o") mark(true);
});

// ===== 앱 시작: 덱 로드 =====
loadDeck();
</script>
</body>
</html>
