<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence Flashcards — Yuran</title>
<style>
  :root {
    --bg: #0d0d1a;
    --bg-soft: #13132a;
    --bg-elev: #1a1a35;
    --paper: #f0eeff;
    --ink: #1a1a2e;
    --accent: #7c6af7;
    --accent-bright: #a594ff;
    --accent-soft: #c4baff;
    --gold: #f59e0b;
    --sage: #34d399;
    --red: #f87171;
    --muted: #6b6b9a;
    --border: rgba(124,106,247,0.15);
    --sys-font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "Apple SD Gothic Neo", sans-serif;
    --mono-font: "SF Mono", ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: #e0e0f0;
    font-family: var(--sys-font);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(124,106,247,0.1), transparent 55%),
      radial-gradient(ellipse at 80% 90%, rgba(52,211,153,0.06), transparent 55%);
    padding: 16px 16px 80px;
  }
  .wrap { max-width: 520px; margin: 0 auto; }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .logo { font-weight: 800; font-size: 22px; letter-spacing: -0.03em; color: var(--accent-soft); }
  .logo span { color: var(--accent-bright); }
  .sub { font-family: var(--mono-font); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 7px; margin-bottom: 16px; }
  .stat { background: var(--bg-soft); border: 0.5px solid var(--border); padding: 10px 6px; border-radius: 10px; text-align: center; }
  .stat-num { font-weight: 700; font-size: 22px; line-height: 1; letter-spacing: -0.02em; }
  .stat-num.purple { color: var(--accent-bright); }
  .stat-num.green { color: var(--sage); }
  .stat-num.gold { color: var(--gold); }
  .stat-num.red { color: var(--red); }
  .stat-label { font-family: var(--mono-font); font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-top: 3px; }

  /* Filters */
  .filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 10px; scrollbar-width: none; align-items: center; }
  .filter-row::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; background: transparent; border: 0.5px solid rgba(200,190,255,0.2);
    color: #c0b8f0; padding: 6px 12px; border-radius: 999px;
    font-family: var(--sys-font); font-size: 11px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent-bright); }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .icon-btn {
    flex-shrink: 0; background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 6px 10px; font-size: 14px; cursor: pointer; transition: all 0.2s; color: #888;
  }
  .icon-btn.active { background: rgba(124,106,247,0.2); border-color: var(--accent); color: var(--accent-bright); }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent-bright); }

  /* Progress */
  .progress-text { font-family: var(--mono-font); font-size: 11px; color: var(--muted); text-align: center; margin-bottom: 6px; letter-spacing: 0.07em; }
  .progress-bar { height: 2px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--sage)); transition: width 0.4s; }

  /* Card */
  .card {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px 22px;
    margin-bottom: 10px;
    position: relative;
  }
  .card-accent-line {
    position: absolute; top: 0; left: 22px; right: 22px; height: 2px;
    background: linear-gradient(90deg, var(--accent), #a855f7, var(--sage));
    border-radius: 0 0 2px 2px; opacity: 0.8;
  }
  .card-meta { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; justify-content: space-between; }
  .tag { padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; letter-spacing: 0.04em; }
  .tag-weak { background: rgba(245,158,11,0.15); color: var(--gold); }
  .tag-cat { background: rgba(255,255,255,0.06); color: #888; }
  .tag-source { background: rgba(255,255,255,0.03); color: #555; }
  .tag-pass { background: rgba(248,113,113,0.12); color: var(--red); }

  .korean-text {
    font-size: 26px; font-weight: 800; line-height: 1.5; color: #f0eeff;
    letter-spacing: -0.03em; margin-bottom: 18px; padding: 10px 0 4px;
  }

  /* Hint boxes */
  .hint-box {
    border-radius: 10px; padding: 10px 13px; margin-bottom: 10px;
    font-size: 13px; line-height: 1.65; animation: fadeUp 0.25s ease;
  }
  .hint-box.hint1 { background: rgba(124,106,247,0.08); color: #9f96e8; border: 1px solid rgba(124,106,247,0.15); }
  .hint-box.hint2 { background: rgba(124,106,247,0.1); color: #e0e0f0; border: 1px solid rgba(124,106,247,0.2); }
  .blank-highlight { background: rgba(165,148,255,0.2); border-radius: 4px; padding: 1px 10px; color: var(--accent-bright); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  /* Action row */
  .action-row { display: flex; gap: 7px; }
  .btn {
    border: none; border-radius: 10px; cursor: pointer;
    font-family: var(--sys-font); font-weight: 600; transition: all 0.18s;
    font-size: 12px; padding: 9px 0;
  }
  .btn:active { transform: scale(0.97); }
  .btn-hint { flex: 1; background: rgba(124,106,247,0.1); border: 1px solid rgba(124,106,247,0.2); color: #9f96e8; }
  .btn-hint:hover { background: rgba(124,106,247,0.18); }
  .btn-reveal { flex: 1.6; background: linear-gradient(135deg, rgba(124,106,247,0.25), rgba(168,85,247,0.2)); border: 1px solid rgba(124,106,247,0.35); color: var(--accent-bright); font-size: 13px; }
  .btn-reveal:hover { background: linear-gradient(135deg, rgba(124,106,247,0.35), rgba(168,85,247,0.3)); }
  .btn-pass { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); color: #7a3535; padding: 9px 12px; }
  .btn-pass.warn { background: rgba(248,113,113,0.18); border-color: rgba(248,113,113,0.4); color: var(--red); }

  /* Answer panel */
  .answer-panel {
    background: linear-gradient(145deg, rgba(124,106,247,0.1), rgba(168,85,247,0.07));
    border: 1px solid rgba(124,106,247,0.25);
    border-radius: 16px; padding: 18px 20px;
    margin-bottom: 10px;
    animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
  }
  .answer-label { font-family: var(--mono-font); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 7px; }
  .answer-text { font-size: 22px; font-weight: 800; color: var(--accent-bright); line-height: 1.4; letter-spacing: -0.02em; margin-bottom: 10px; }
  .answer-hint { font-size: 12px; color: #6b6baa; line-height: 1.6; margin-bottom: 16px; }
  .answer-hint strong { color: var(--accent); }
  .diff-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .diff-btn { border: none; border-radius: 10px; padding: 10px 0; font-size: 12px; font-weight: 700; color: #fff; cursor: pointer; transition: all 0.18s; font-family: var(--sys-font); }
  .diff-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
  .diff-btn:active { transform: translateY(0); }
  .diff-easy { background: #14532d; }
  .diff-med { background: #713f12; }
  .diff-hard { background: #7f1d1d; }

  /* Nav */
  .nav-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .nav-btn { flex: 1; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #e0e0f0; padding: 11px; border-radius: 10px; font-family: var(--sys-font); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; transition: all 0.2s; }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent-bright); }
  .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }

  /* Backup row */
  .backup-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
  .backup-row label { cursor: pointer; display: block; }

  /* Empty */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }

  /* Loading */
  #loadingScreen { text-align: center; padding: 80px 20px; }
  .loading-spinner { font-size: 36px; display: inline-block; animation: spin 1.5s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: var(--mono-font); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 14px; }
  .loading-error { font-size: 13px; color: var(--red); margin-top: 10px; line-height: 1.6; }

  .reset-btn { background: transparent; border: none; color: var(--muted); font-family: var(--sys-font); font-size: 11px; cursor: pointer; text-decoration: underline; text-decoration-color: rgba(107,107,154,0.3); padding: 16px; display: block; margin: 0 auto; }
  .reset-btn:hover { color: var(--red); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">Sentence<span>·</span>cards</div>
    <div class="sub" id="saveStatus">Yuran / EN</div>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-num purple" id="sTotal">0</div><div class="stat-label">Deck</div></div>
    <div class="stat"><div class="stat-num green" id="sSeen">0</div><div class="stat-label">Seen</div></div>
    <div class="stat"><div class="stat-num gold" id="sEasy">0</div><div class="stat-label">Easy</div></div>
    <div class="stat"><div class="stat-num red" id="sPassed">0</div><div class="stat-label">⏭ Passed</div></div>
  </div>

  <!-- Filter chips -->
  <div class="filter-row" id="filterRow"></div>
  <div class="filter-row" id="catRow"></div>

  <div class="progress-text" id="progressText">0 / 0</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <!-- Loading -->
  <div id="loadingScreen">
    <div class="loading-spinner">◌</div>
    <div class="loading-text">덱 불러오는 중...</div>
    <div class="loading-error" id="loadingError" style="display:none;"></div>
  </div>

  <!-- Main area -->
  <div id="mainArea" style="display:none;">

    <!-- Answer panel (above card when revealed) -->
    <div id="answerPanel" style="display:none;"></div>

    <!-- Card -->
    <div class="card" id="card">
      <div class="card-accent-line"></div>
      <div class="card-meta" id="cardMeta"></div>
      <div class="korean-text" id="koreanText">—</div>
      <div id="hint1Box" style="display:none;"></div>
      <div id="hint2Box" style="display:none;"></div>
      <div class="action-row" id="actionRow"></div>
    </div>

    <!-- Nav -->
    <div class="nav-row">
      <button class="nav-btn" onclick="prevCard()">← Prev</button>
      <button class="nav-btn" onclick="shuffleDeck()">⤭ Shuffle</button>
      <button class="nav-btn" onclick="nextCard()">Next →</button>
    </div>

    <!-- Backup -->
    <div class="backup-row">
      <button class="nav-btn" onclick="exportProgress()">↓ Export</button>
      <label class="nav-btn" style="text-align:center;">
        ↑ Import
        <input type="file" accept="application/json" onchange="importProgress(event)" style="display:none;">
      </label>
      <button class="nav-btn" onclick="copyList()">📋 목록복사</button>
    </div>

    <button class="reset-btn" onclick="resetProgress()">Reset progress</button>
  </div>
</div>

<script>
// ================================================================
// ★ Google Sheets 웹에 게시 CSV URL — 여기만 교체
// ================================================================
const SHEETS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqahWtcgEXy-iKHNZ-goh6wbqm5jmHnB3Q_7wlvCxnV9ln2pRVC2_sHDItQ4IjK8iepz8651qVvBhI/pub?gid=0&single=true&output=csv";
// ================================================================

const STORAGE_KEY = "sentence-flashcards-yuran-v1";

const WEAK_TAGS = ["all", "articles", "prepositions", "would-will"];
const WEAK_TAG_LABELS = { "all": "All", "articles": "관사", "prepositions": "전치사", "would-will": "would/will" };

let DECK = [];
let state = {
  filter: { tag: "all", category: "all", hidePassed: true, starred: false },
  shuffle: false,
  order: [],
  idx: 0,
  revealed: false,
  hint1: false,
  hint2: false,
  cardStates: {},
};
let CATEGORIES = ["all"];

// ── CSV 파싱 ──
function parseCSVLine(line) {
  const result = []; let cur = "", inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (ch === ',' && !inQ) { result.push(cur); cur = ""; }
    else cur += ch;
  }
  result.push(cur);
  return result;
}

async function loadDeck() {
  try {
    const res = await fetch(SHEETS_CSV_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const csv = await res.text();
    const lines = csv.trim().split('\n');
    const headers = parseCSVLine(lines[0]).map(h => h.trim().replace(/^"|"$/g, ''));
    DECK = lines.slice(1).filter(l => l.trim()).map(line => {
      const vals = parseCSVLine(line);
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim(); });
      return obj;
    }).filter(c => c.korean && c.english);

    // 카테고리 추출
    const cats = [...new Set(DECK.map(c => c.category).filter(Boolean))];
    CATEGORIES = ["all", ...cats.sort()];

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainArea').style.display = '';
    loadStoredState();
    buildOrder();
    render();
  } catch(err) {
    console.error(err);
    document.querySelector('.loading-spinner').style.display = 'none';
    document.querySelector('.loading-text').textContent = '덱 로드 실패';
    const el = document.getElementById('loadingError');
    el.style.display = '';
    el.textContent = 'Sheets URL을 확인하거나 새로고침 해주세요.\n오류: ' + err.message;
  }
}

// ── State persistence ──
function loadStoredState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved.filter) state.filter = { ...state.filter, ...saved.filter };
      if (saved.cardStates) state.cardStates = saved.cardStates;
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      filter: state.filter,
      cardStates: state.cardStates,
    }));
    flash("✓ saved");
  } catch(e) { flash("✗ save failed"); }
}

function flash(msg) {
  const el = document.getElementById('saveStatus');
  el.textContent = msg;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.textContent = ""; }, 2000);
}

// ── Filtering & ordering ──
function getFiltered() {
  return DECK.filter(c => {
    if (state.filter.tag !== "all" && c.weakTag !== state.filter.tag) return false;
    if (state.filter.category !== "all" && c.category !== state.filter.category) return false;
    if (state.filter.hidePassed && (state.cardStates[c.id]?.passCount || 0) >= 3) return false;
    if (state.filter.starred && !state.cardStates[c.id]?.starred) return false;
    return true;
  });
}

function buildOrder() {
  const filtered = getFiltered();
  let arr = filtered.map((_, i) => i);
  if (state.shuffle) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  }
  state.order = arr.map(i => filtered[i]);
  state.idx = 0;
  state.revealed = false;
  state.hint1 = false;
  state.hint2 = false;
}

function currentCard() {
  return state.order[state.idx] || null;
}

// ── Render ──
function render() {
  renderFilterRow();
  renderCatRow();
  updateStats();

  const card = currentCard();
  if (!card) {
    document.getElementById('card').innerHTML = `<div class="empty">카드 없음.<br><small style="color:#555;">필터 조정 또는 ⏭ 토글 확인</small></div>`;
    document.getElementById('answerPanel').style.display = 'none';
    document.getElementById('progressText').textContent = '0 / 0';
    document.getElementById('progressFill').style.width = '0%';
    return;
  }

  // Restore card HTML
  document.getElementById('card').innerHTML = `
    <div class="card-accent-line"></div>
    <div class="card-meta" id="cardMeta"></div>
    <div class="korean-text" id="koreanText"></div>
    <div id="hint1Box" style="display:none;"></div>
    <div id="hint2Box" style="display:none;"></div>
    <div class="action-row" id="actionRow"></div>
  `;

  const cSt = state.cardStates[card.id] || {};
  const passCount = cSt.passCount || 0;

  // Meta tags
  const meta = document.getElementById('cardMeta');
  let tagsHtml = '<div style="display:flex;gap:4px;flex-wrap:wrap;">';
  if (card.weakTag) tagsHtml += `<span class="tag tag-weak">${card.weakTag}</span>`;
  if (card.category) tagsHtml += `<span class="tag tag-cat">${card.category}</span>`;
  if (card.source) tagsHtml += `<span class="tag tag-source">${card.source}</span>`;
  if (passCount > 0) tagsHtml += `<span class="tag tag-pass">skip ${passCount}/3</span>`;
  tagsHtml += '</div>';
  tagsHtml += `<span style="font-size:16px;cursor:pointer;" onclick="toggleStar()">${cSt.starred ? '⭐' : '☆'}</span>`;
  meta.innerHTML = tagsHtml;

  // Korean
  document.getElementById('koreanText').textContent = card.korean;

  // Hint boxes (restore state)
  if (state.hint1 && card.hint) {
    const h1 = document.getElementById('hint1Box');
    h1.className = 'hint-box hint1';
    h1.innerHTML = `💡 ${card.hint}`;
    h1.style.display = '';
  }
  if (state.hint2 && card.blanked) {
    const h2 = document.getElementById('hint2Box');
    h2.className = 'hint-box hint2';
    h2.innerHTML = renderBlanked(card.blanked);
    h2.style.display = '';
  }

  // Action row
  const hintDone = state.hint1 && state.hint2;
  const hintLabel = !state.hint1 ? '💡 Hint 1' : !state.hint2 ? '💡 Hint 2' : '✓ All hints';
  document.getElementById('actionRow').innerHTML = `
    <button class="btn btn-hint" onclick="showHint()">${hintLabel}</button>
    <button class="btn btn-reveal" onclick="revealCard()" ${state.revealed ? 'style="background:rgba(255,255,255,0.04);color:#555;border-color:rgba(255,255,255,0.08);"' : ''}>
      ${state.revealed ? 'Hide ↑' : 'Reveal ↓'}
    </button>
    <button class="btn btn-pass ${passCount >= 2 ? 'warn' : ''}" onclick="passCard()" title="3번 pass하면 목록에서 제외">⏭${passCount > 0 ? ' '+passCount : ''}</button>
  `;

  // Answer panel
  const panel = document.getElementById('answerPanel');
  if (state.revealed) {
    panel.style.display = '';
    panel.innerHTML = `
      <div class="answer-panel">
        <div class="answer-label">정답</div>
        <div class="answer-text">${card.english}</div>
        ${card.hint ? `<div class="answer-hint">💡 <strong>${card.hint}</strong></div>` : ''}
        <div class="diff-row">
          <button class="diff-btn diff-easy" onclick="rateDiff('easy')">😌 Easy</button>
          <button class="diff-btn diff-med" onclick="rateDiff('med')">🤔 Med</button>
          <button class="diff-btn diff-hard" onclick="rateDiff('hard')">😰 Hard</button>
        </div>
      </div>
    `;
  } else {
    panel.style.display = 'none';
  }

  // Progress
  document.getElementById('progressText').textContent = `${state.idx + 1} / ${state.order.length}`;
  document.getElementById('progressFill').style.width = `${((state.idx + 1) / state.order.length) * 100}%`;
}

function renderBlanked(blanked) {
  return blanked.split('___').map((part, i, arr) =>
    i < arr.length - 1
      ? `${part}<span class="blank-highlight">___</span>`
      : part
  ).join('');
}

function renderFilterRow() {
  const row = document.getElementById('filterRow');
  row.innerHTML = WEAK_TAGS.map(t => {
    const active = state.filter.tag === t;
    const label = WEAK_TAG_LABELS[t] || t;
    return `<button class="chip ${active ? 'active' : ''}" onclick="setTagFilter('${t}')">${label}</button>`;
  }).join('');

  // Star + hidePassed toggles
  row.innerHTML += `
    <button class="icon-btn ${state.filter.starred ? 'active' : ''}" onclick="toggleStarFilter()">⭐</button>
    <button class="icon-btn ${state.filter.hidePassed ? 'active' : ''}" onclick="toggleHidePassed()" title="3회 pass 카드 숨김">⏭</button>
    <button class="icon-btn ${state.shuffle ? 'active' : ''}" onclick="toggleShuffle()">🔀</button>
  `;
}

function renderCatRow() {
  const row = document.getElementById('catRow');
  row.innerHTML = CATEGORIES.map(c => {
    const active = state.filter.category === c;
    const label = c === 'all' ? 'All' : c;
    return `<button class="chip ${active ? 'active' : ''}" onclick="setCatFilter('${c}')">${label}</button>`;
  }).join('');
}

function updateStats() {
  const all = DECK;
  let seen = 0, easy = 0, passed = 0;
  all.forEach(c => {
    const cs = state.cardStates[c.id];
    if (!cs) return;
    if (cs.seen) seen++;
    if (cs.difficulty === 'easy') easy++;
    if ((cs.passCount || 0) >= 3) passed++;
  });
  document.getElementById('sTotal').textContent = getFiltered().length;
  document.getElementById('sSeen').textContent = seen;
  document.getElementById('sEasy').textContent = easy;
  document.getElementById('sPassed').textContent = passed;
}

// ── Card actions ──
function showHint() {
  const card = currentCard();
  if (!card) return;
  if (!state.hint1) { state.hint1 = true; }
  else if (!state.hint2) { state.hint2 = true; }
  render();
}

function revealCard() {
  const card = currentCard();
  if (!card) return;
  state.revealed = !state.revealed;
  if (state.revealed) {
    if (!state.cardStates[card.id]) state.cardStates[card.id] = {};
    state.cardStates[card.id].seen = true;
  }
  render();
}

function rateDiff(level) {
  const card = currentCard();
  if (!card) return;
  if (!state.cardStates[card.id]) state.cardStates[card.id] = {};
  state.cardStates[card.id].difficulty = level;
  state.cardStates[card.id].seen = true;
  saveState();
  nextCard();
}

function passCard() {
  const card = currentCard();
  if (!card) return;
  if (!state.cardStates[card.id]) state.cardStates[card.id] = {};
  const prev = state.cardStates[card.id].passCount || 0;
  state.cardStates[card.id].passCount = prev + 1;
  saveState();
  nextCard();
}

function toggleStar() {
  const card = currentCard();
  if (!card) return;
  if (!state.cardStates[card.id]) state.cardStates[card.id] = {};
  state.cardStates[card.id].starred = !state.cardStates[card.id].starred;
  saveState();
  render();
}

// ── Navigation ──
function nextCard() {
  if (state.idx < state.order.length - 1) {
    state.idx++;
    state.revealed = false;
    state.hint1 = false;
    state.hint2 = false;
    render();
    saveState();
  }
}

function prevCard() {
  if (state.idx > 0) {
    state.idx--;
    state.revealed = false;
    state.hint1 = false;
    state.hint2 = false;
    render();
    saveState();
  }
}

function shuffleDeck() {
  state.shuffle = !state.shuffle;
  buildOrder();
  render();
}

// ── Filter handlers ──
function setTagFilter(tag) { state.filter.tag = tag; buildOrder(); render(); saveState(); }
function setCatFilter(cat) { state.filter.category = cat; buildOrder(); render(); saveState(); }
function toggleStarFilter() { state.filter.starred = !state.filter.starred; buildOrder(); render(); saveState(); }
function toggleHidePassed() { state.filter.hidePassed = !state.filter.hidePassed; buildOrder(); render(); saveState(); }
function toggleShuffle() { state.shuffle = !state.shuffle; buildOrder(); render(); }

// ── Backup ──
function exportProgress() {
  const data = JSON.stringify({ filter: state.filter, cardStates: state.cardStates, exported: new Date().toISOString() }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'sentence-cards-progress.json'; a.click();
  URL.revokeObjectURL(url);
  flash('✓ exported');
}

function importProgress(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const saved = JSON.parse(e.target.result);
      if (saved.filter) state.filter = { ...state.filter, ...saved.filter };
      if (saved.cardStates) state.cardStates = saved.cardStates;
      buildOrder(); render(); saveState();
      flash('✓ imported');
    } catch { flash('✗ invalid file'); }
  };
  reader.readAsText(file);
  ev.target.value = '';
}

function copyList() {
  if (!DECK.length) return;
  const lines = DECK.map((c, i) => {
    const cs = state.cardStates[c.id] || {};
    const diff = cs.difficulty ? `[${cs.difficulty}]` : '[미학습]';
    const pass = (cs.passCount || 0) >= 3 ? '[passed]' : '';
    return `${i+1}. ${diff}${pass} [${c.category||''}] ${c.korean} → ${c.english}`;
  });
  const text = `[문장 플래시카드 ${DECK.length}장 — ${new Date().toLocaleDateString('ko-KR')}]\n${'─'.repeat(50)}\n` + lines.join('\n');
  navigator.clipboard.writeText(text).then(() => flash(`✓ ${DECK.length}장 복사됨`)).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); flash(`✓ ${DECK.length}장 복사됨`);
  });
}

function resetProgress() {
  if (!confirm('학습 데이터 전체 초기화할까?')) return;
  state.cardStates = {};
  buildOrder(); render(); saveState();
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); revealCard(); }
  else if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === '1') rateDiff('easy');
  else if (e.key === '2') rateDiff('med');
  else if (e.key === '3') rateDiff('hard');
  else if (e.key === 'h' || e.key === 'H') showHint();
});

// ── Init ──
loadDeck();
</script>
</body>
</html>
